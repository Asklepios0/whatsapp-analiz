<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sohbet İstihbaratı | AI Powered</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root { --whatsapp-green: #25D366; --dark-bg: #0b141a; --card-bg: #111b21; --text: #e9edef; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; background: var(--dark-bg); color: var(--text); margin: 0; padding: 10px; font-size: 14px; }
        .container { max-width: 450px; margin: auto; } 
        
        .header-card { background: var(--card-bg); padding: 20px; border-radius: 15px; text-align: center; border-bottom: 3px solid var(--whatsapp-green); margin-bottom: 15px; }
        select, .custom-file-upload { background: #202c33; color: white; border: 1px solid var(--whatsapp-green); padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 10px; font-weight: bold; box-sizing: border-box; display: block; text-align: center; }
        input[type="file"] { display: none; }
        
        .progress-bar { width: 100%; height: 4px; background: #2a3942; border-radius: 5px; margin: 10px 0; display: none; overflow: hidden; }
        .progress-inner { height: 100%; background: var(--whatsapp-green); width: 0%; transition: 0.3s; }

        #renderArea { background: var(--dark-bg); padding: 5px; }
        .dashboard { display: none; flex-direction: column; gap: 10px; }
        
        .card { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid #202c33; }
        .card h3 { margin: 0 0 10px 0; font-size: 1em; color: var(--whatsapp-green); }
        
        .ai-summary { background: #1a252b; padding: 12px; border-radius: 8px; font-style: italic; line-height: 1.4; border-left: 3px solid var(--whatsapp-green); }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .stat-box { background: #1a252b; padding: 8px; border-radius: 8px; text-align: center; }
        .stat-box span { display: block; font-size: 0.8em; color: #8696a0; }
        .stat-box b { font-size: 1.1em; color: #fff; }

        .person-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #2a3942; }
        .person-row:last-child { border-bottom: none; }
        .person-info { display: flex; flex-direction: column; width: 40%; }
        .person-metrics { display: flex; flex-direction: column; text-align: right; font-size: 0.85em; color: #8696a0; }
        
        .percent-bar { width: 100%; height: 6px; background: #2a3942; border-radius: 3px; margin-top: 4px; }
        .percent-fill { height: 100%; border-radius: 3px; }

        .pill-container { display: flex; flex-wrap: wrap; gap: 5px; }
        .pill { background: #1a252b; padding: 3px 8px; border-radius: 12px; font-size: 0.85em; }

        #exportBtn { display: none; background: #FF0050; color: white; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; }
        .watermark { display: none; text-align: center; color: #8696a0; font-size: 0.75em; margin-top: 10px; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-card">
            <h1 style="margin: 0 0 5px 0;">Sohbet Analizi <small style="font-size: 0.5em;">AI</small></h1>
            <p style="font-size: 0.8em; color: #8696a0; margin: 0 0 15px 0;">Veriler cihazda işlenir ve AI için anonimleştirilir.</p>
            
            <select id="relationType">
                <option value="Flört/Sevgili">❤️ Flört / Sevgili Sohbeti</option>
                <option value="Arkadaş/Kanka">🍻 Arkadaş / Kanka</option>
                <option value="Aile">🏠 Aile Sohbeti</option>
                <option value="İş/Diğer">💼 İş / Diğer</option>
            </select>

            <label for="chatFile" class="custom-file-upload">Sohbeti Seç (.txt / .zip)</label>
            <input type="file" id="chatFile" accept=".txt, .zip">
            
            <div id="status" style="margin-top: 10px; font-size: 0.85em; color: #ffeb3b;"></div>
            <div class="progress-bar" id="pBar"><div class="progress-inner" id="pInner"></div></div>
            <button id="exportBtn">📸 Story Olarak Kaydet</button>
        </div>

        <div id="renderArea">
            <div class="dashboard" id="dashboard">
                <div class="card">
                    <h3>🤖 Yapay Zeka Teşhisi</h3>
                    <div id="aiSummaryText" class="ai-summary">Analiz ediliyor...</div>
                </div>

                <div class="grid-2">
                    <div class="stat-box"><span>Toplam Mesaj</span><b id="totalMsgs">-</b></div>
                    <div class="stat-box"><span>Başlangıç</span><b id="startDate">-</b></div>
                    <div class="stat-box"><span>Rekor Gün</span><b id="peakDate">-</b></div>
                    <div class="stat-box"><span>En Uzun Sessizlik</span><b id="longestSilence">-</b></div>
                </div>

                <div class="card">
                    <h3>Kişi Dinamikleri (Hacim & Davranış)</h3>
                    <div id="peopleStats"></div>
                </div>

                <div class="grid-2" style="margin-bottom:0;">
                    <div class="card" style="padding:10px;">
                        <h3 style="font-size:0.9em;">Favori Emojiler</h3>
                        <div class="pill-container" id="emojiList"></div>
                    </div>
                    <div class="card" style="padding:10px;">
                        <h3 style="font-size:0.9em;">Sık Kelimeler</h3>
                        <div class="pill-container" id="wordCloud"></div>
                    </div>
                </div>
            </div>
            <div class="watermark" id="watermark">Analizini yap: sohbetanalizi.vercel.app</div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
